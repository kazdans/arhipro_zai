name: Build check

# Šis workflow tikai PĀRBAUDA, vai Astro build veiksmīgi iziet,
# pirms izmaiņas tiek apvienotas (merge) ar main zaru.
# Pats deploy notiek Cloudflare web interfeisā caur Git integrāciju
# (skatīt HOSTING.md) — tāpēc šeit nav vajadzīgi Cloudflare Secrets.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Verify Astro build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3
